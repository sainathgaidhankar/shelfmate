{% extends "base.html" %}
{% block title %}404 | ShelfMate{% endblock %}
{% block shell_subtitle %}Page not found.{% endblock %}
{% block shell_actions %}
<a href="{{ url_for('main.welcome') }}" class="rounded-full bg-sand px-4 py-2 text-sm font-semibold text-ink transition hover:bg-amber-200">Back Home</a>
{% endblock %}
{% block content %}
<div class="mx-auto max-w-2xl">
    <div class="glass-panel rounded-[32px] border border-white/60 px-6 py-10 text-center shadow-glow sm:px-10">
        <p class="font-mono text-xs uppercase tracking-[0.3em] text-coral">404</p>
        <h1 class="mt-4 font-display text-4xl font-bold text-ink">The page you requested could not be found.</h1>
    </div>
</div>
{% endblock %}
