<!DOCTYPE html>
<html>
<head>
    <title>Welcome | ShelfMate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            animation: fadeIn 1s ease-in;
            color: white;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .hero {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 60px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            text-align: center;
            animation: slideUp 1s ease-out;
        }
        .hero h1 { font-size: 3rem; font-weight: bold; }
        .hero p { font-size: 1.3rem; margin-bottom: 30px; }

        .btn-animated {
            font-size: 1.2rem; font-weight: bold;
            border-radius: 10px; padding: 12px 24px; margin: 10px;
            transition: transform 0.3s;
        }
        .btn-animated:hover { transform: scale(1.05); }

        .avatar {
            width: 80px; height: 80px; border-radius: 50%; margin-bottom: 15px;
            transition: transform 0.3s;
        }
        .avatar:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="hero col-md-8">
            <h1>Welcome to ShelfMate</h1>
            <p>Your smart Library Management System</p>
            <div class="d-flex justify-content-center gap-4">
                <div>
                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="avatar" alt="Student">
                    <a href="{{ url_for('auth.login') }}" class="btn btn-light btn-animated">Student Login</a>
                </div>
                <div>
                    <img src="https://cdn-icons-png.flaticon.com/512/1077/1077063.png" class="avatar" alt="Admin">
                    <a href="{{ url_for('auth.admin_login') }}" class="btn btn-dark btn-animated">Admin Login</a>
                </div>
                <div>
                    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828469.png" class="avatar" alt="Register">
                    <a href="{{ url_for('auth.register') }}" class="btn btn-success btn-animated">Register</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
