<!DOCTYPE html>
<html>
<head>
    <title>Add Book | ShelfMate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            animation: fadeIn 1s ease-in;
            color: white;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .card {
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            animation: slideUp 1s ease-out;
        }
        .card h2 {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-control {
            background: rgba(255,255,255,0.85);
            border: none;
            border-radius: 8px;
        }
        .btn-custom {
            background: linear-gradient(135deg, #007BFF, #00C851);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            transition: transform 0.3s;
        }
        .btn-custom:hover { transform: scale(1.05); }
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display:block;
            margin:0 auto 20px;
            transition: transform 0.3s;
        }
        .avatar:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fs-4" href="{{ url_for('admin.dashboard') }}">ShelfMate Admin</a>
            <div class="d-flex">
                <form method="POST" action="{{ url_for('auth.logout') }}" class="mb-0">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="btn btn-danger">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card col-md-6">
            <img src="https://cdn-icons-png.flaticon.com/512/29/29302.png" class="avatar" alt="Book Avatar">
            <h2>Add New Book</h2>
            <form method="POST" action="{{ url_for('admin.add_book') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <input type="text" name="book_id" class="form-control" placeholder="Book ID" required>
                </div>
                <div class="mb-3">
                    <input type="text" name="title" class="form-control" placeholder="Title" required>
                </div>
                <div class="mb-3">
                    <input type="text" name="author" class="form-control" placeholder="Author" required>
                </div>
                <div class="mb-3">
                    <input type="text" name="department" class="form-control" placeholder="Department" required>
                </div>
                <div class="mb-3">
                    <input type="text" name="subject" class="form-control" placeholder="Subject" required>
                </div>
                <div class="mb-3">
                    <input type="number" name="total_copies" class="form-control" placeholder="Total Copies" required>
                </div>
                <button type="submit" class="btn btn-custom w-100">Add Book</button>
            </form>
        </div>
    </div>
</body>
</html>
