<!DOCTYPE html>
<html>
<head>
    <title>Student Login | ShelfMate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            animation: fadeIn 1s ease-in;
            color: white;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            text-align: center;
            animation: slideUp 1s ease-out;
        }
        .login-card h2 { font-size: 2rem; font-weight: bold; margin-bottom: 20px; }
        .form-control { background: rgba(255,255,255,0.85); border: none; border-radius: 8px; }
        .btn-custom {
            background: linear-gradient(135deg, #007BFF, #00C851);
            border: none; color: white; font-weight: bold; border-radius: 8px;
            transition: transform 0.3s;
        }
        .btn-custom:hover { transform: scale(1.05); }
        .avatar { width: 90px; height: 90px; border-radius: 50%; margin-bottom: 20px; transition: transform 0.3s; }
        .avatar:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="login-card col-md-4">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="avatar" alt="Student">
            <h2>Student Login</h2>
            <form method="POST" action="{{ url_for('auth.login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <input type="email" name="email" class="form-control" placeholder="Email" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-custom w-100">Login</button>
            </form>
            <div class="mt-3">
                <a href="{{ url_for('auth.register') }}" class="text-light">New user? Register here</a>
            </div>
        </div>
    </div>
</body>
</html>
